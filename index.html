<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Card Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: #2e2e2e;
    --accent: #c8f060;
    --accent-dim: #a0c040;
    --text: #f0ede6;
    --muted: #666;
    --danger: #ff5a5a;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px 0;
    overflow-x: hidden;
  }

  header {
    width: 100%;
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  header span {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .main {
    width: 100%;
    max-width: 480px;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* API Key section */
  .api-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .api-section label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .api-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .api-section input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-section input:focus { border-color: var(--accent); }

  .save-btn {
    background: var(--border);
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .save-btn:active { background: var(--accent); color: var(--bg); }
  .key-saved { font-size: 11px; color: var(--accent); display: none; }

  /* Photo capture */
  .capture-area {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .photo-slot {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    min-height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .photo-slot:active { background: #222; border-color: var(--accent); }
  .photo-slot.has-photo { border-style: solid; border-color: var(--border); }

  .photo-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
    border-radius: calc(var(--radius) - 1px);
  }

  .photo-slot .slot-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    z-index: 1;
  }

  .photo-slot .slot-icon {
    font-size: 28px;
    z-index: 1;
    opacity: 0.4;
  }

  .photo-slot .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    border-radius: calc(var(--radius) - 1px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    z-index: 2;
  }

  .photo-slot .overlay span {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #fff;
  }

  .photo-slot .clear-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .back-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 0;
    cursor: pointer;
    user-select: none;
  }

  .back-toggle input[type=checkbox] { display: none; }

  .toggle-track {
    width: 40px;
    height: 24px;
    background: var(--border);
    border-radius: 12px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle-track::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    background: var(--muted);
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: transform 0.2s, background 0.2s;
  }

  input:checked ~ .toggle-track { background: var(--accent); }
  input:checked ~ .toggle-track::after { transform: translateX(16px); background: var(--bg); }

  .back-toggle span {
    font-size: 12px;
    color: var(--muted);
  }

  #backSlot { display: none; }
  #backSlot.visible { display: flex; }

  /* Scan button */
  .scan-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    padding: 18px;
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: -0.3px;
    width: 100%;
  }

  .scan-btn:active { transform: scale(0.98); background: var(--accent-dim); }
  .scan-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

  /* Status */
  .status {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    font-size: 12px;
    color: var(--muted);
    display: none;
    line-height: 1.6;
  }

  .status.visible { display: block; }
  .status.error { border-color: var(--danger); color: var(--danger); }
  .status.success { border-color: var(--accent); color: var(--accent); }

  .spinner {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 2px solid var(--muted);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result card */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 20px;
    display: none;
    flex-direction: column;
    gap: 14px;
  }

  .result-card.visible { display: flex; }

  .result-card h2 {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .result-card .vcf-preview {
    background: var(--bg);
    border-radius: 10px;
    padding: 14px;
    font-size: 11px;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.7;
    max-height: 200px;
    overflow-y: auto;
  }

  .result-actions {
    display: flex;
    gap: 10px;
  }

  .dl-btn {
    flex: 1;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.5px;
  }

  .dl-btn:active { background: var(--accent-dim); }

  .copy-btn {
    background: var(--border);
    color: var(--text);
    border: none;
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .copy-btn:active { background: #444; }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    width: 100%;
    transition: border-color 0.2s, color 0.2s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .reset-btn:active { border-color: var(--text); color: var(--text); }

  /* Hidden file inputs */
  input[type=file] { display: none; }

  .hint {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.5px;
    line-height: 1.6;
    padding: 0 8px;
  }
</style>
</head>
<body>

<header>
  <h1>Card Scanner</h1>
  <span>via Claude</span>
</header>

<div class="main">

  <!-- API Key -->
  <div class="api-section">
    <label>Anthropic API Key</label>
    <div class="api-row">
      <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false">
      <button class="save-btn" onclick="saveKey()">Save</button>
    </div>
    <div class="key-saved" id="keySaved">✓ Key saved to this device</div>
  </div>

  <!-- Photo capture -->
  <div class="capture-area">

    <!-- Front -->
    <div class="photo-slot" id="frontSlot" onclick="triggerCapture('front')">
      <div class="slot-icon">📷</div>
      <div class="slot-label">Front of card</div>
    </div>
    <input type="file" id="frontInput" accept="image/*" capture="environment" onchange="handlePhoto('front', this)">

    <!-- Back toggle -->
    <label class="back-toggle">
      <input type="checkbox" id="backToggle" onchange="toggleBack(this)">
      <div class="toggle-track"></div>
      <span>Card has a back side</span>
    </label>

    <!-- Back -->
    <div class="photo-slot" id="backSlot" onclick="triggerCapture('back')">
      <div class="slot-icon">📷</div>
      <div class="slot-label">Back of card</div>
    </div>
    <input type="file" id="backInput" accept="image/*" capture="environment" onchange="handlePhoto('back', this)">

  </div>

  <!-- Scan button -->
  <button class="scan-btn" id="scanBtn" onclick="scan()" disabled>Scan Card</button>

  <!-- Status -->
  <div class="status" id="status"></div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <h2 id="contactName">Contact</h2>
    <div class="vcf-preview" id="vcfPreview"></div>
    <div class="result-actions">
      <button class="dl-btn" onclick="downloadVcf()">Download .vcf</button>
      <button class="copy-btn" onclick="copyVcf()">Copy</button>
    </div>
    <button class="reset-btn" onclick="reset()">Scan another card</button>
  </div>

  <p class="hint">Photos are sent directly to Anthropic's API and are not stored anywhere else. Your API key is saved only in your browser's local storage.</p>

</div>

<script>
  let frontPhoto = null;
  let backPhoto = null;
  let currentVcf = '';

  // Load saved key
  window.addEventListener('load', () => {
    const saved = localStorage.getItem('anthropic_key');
    if (saved) {
      document.getElementById('apiKey').value = saved;
      document.getElementById('keySaved').style.display = 'block';
    }
  });

  function saveKey() {
    const key = document.getElementById('apiKey').value.trim();
    if (key) {
      localStorage.setItem('anthropic_key', key);
      document.getElementById('keySaved').style.display = 'block';
    }
  }

  function triggerCapture(side) {
    document.getElementById(side + 'Input').click();
  }

  function handlePhoto(side, input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      const originalDataUrl = e.target.result;

      // Always convert to JPEG via canvas — handles HEIC, PNG, WebP, etc.
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        // Cap at 1600px on longest side to keep payload reasonable
        const maxDim = 1600;
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const jpegDataUrl = canvas.toDataURL('image/jpeg', 0.92);
        const base64 = jpegDataUrl.split(',')[1];

        if (side === 'front') {
          frontPhoto = { base64, dataUrl: jpegDataUrl };
          renderSlot('frontSlot', jpegDataUrl, 'front');
        } else {
          backPhoto = { base64, dataUrl: jpegDataUrl };
          renderSlot('backSlot', jpegDataUrl, 'back');
        }
        updateScanBtn();
      };
      img.src = originalDataUrl;
    };
    reader.readAsDataURL(file);
  }

  function renderSlot(slotId, dataUrl, side) {
    const slot = document.getElementById(slotId);
    slot.classList.add('has-photo');
    slot.onclick = null;

    // Remove existing img/overlay
    slot.querySelectorAll('img, .overlay, .clear-btn, .slot-icon, .slot-label').forEach(el => el.remove());

    const img = document.createElement('img');
    img.src = dataUrl;
    slot.appendChild(img);

    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `<span>Tap to retake</span>`;
    overlay.onclick = () => triggerCapture(side);
    slot.appendChild(overlay);

    const clearBtn = document.createElement('button');
    clearBtn.className = 'clear-btn';
    clearBtn.innerHTML = '✕';
    clearBtn.onclick = (e) => { e.stopPropagation(); clearPhoto(side); };
    slot.appendChild(clearBtn);
  }

  function clearPhoto(side) {
    if (side === 'front') {
      frontPhoto = null;
      resetSlot('frontSlot', 'Front of card', 'front');
    } else {
      backPhoto = null;
      resetSlot('backSlot', 'Back of card', 'back');
    }
    document.getElementById(side + 'Input').value = '';
    updateScanBtn();
  }

  function resetSlot(slotId, label, side) {
    const slot = document.getElementById(slotId);
    slot.classList.remove('has-photo');
    slot.innerHTML = `<div class="slot-icon">📷</div><div class="slot-label">${label}</div>`;
    slot.onclick = () => triggerCapture(side);
  }

  function toggleBack(cb) {
    const backSlot = document.getElementById('backSlot');
    if (cb.checked) {
      backSlot.classList.add('visible');
    } else {
      backSlot.classList.remove('visible');
      clearPhoto('back');
    }
  }

  function updateScanBtn() {
    const btn = document.getElementById('scanBtn');
    const key = document.getElementById('apiKey').value.trim();
    btn.disabled = !frontPhoto || !key;
  }

  document.getElementById('apiKey').addEventListener('input', updateScanBtn);

  function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.className = 'status visible' + (type ? ' ' + type : '');
    el.innerHTML = msg;
  }

  async function toBase64Jpeg(base64, mimeType) {
    // If already jpeg, return as-is. If not, convert via canvas.
    if (mimeType && mimeType.includes('jpeg')) return base64;
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        const jpeg = canvas.toDataURL('image/jpeg', 0.92).split(',')[1];
        resolve(jpeg);
      };
      img.src = 'data:image/png;base64,' + base64;
    });
  }

  async function scan() {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey || !frontPhoto) return;

    const btn = document.getElementById('scanBtn');
    btn.disabled = true;
    document.getElementById('resultCard').classList.remove('visible');

    setStatus('<span class="spinner"></span>Reading card...');

    try {
      const content = [
        {
          type: 'image',
          source: { type: 'base64', media_type: 'image/jpeg', data: frontPhoto.base64 }
        }
      ];

      if (backPhoto) {
        content.push({
          type: 'image',
          source: { type: 'base64', media_type: 'image/jpeg', data: backPhoto.base64 }
        });
      }

      content.push({
        type: 'text',
        text: 'You are a business card parser. Extract all contact information from the image(s) provided and return ONLY a valid vCard 3.0 formatted string. No explanation, no markdown, no code fences — just raw vCard text starting with BEGIN:VCARD and ending with END:VCARD.\n\nUse these fields as applicable: FN, N (format as Last;First;;;), ORG, TITLE, TEL with TYPE=WORK or TYPE=CELL, EMAIL, ADR, URL. Include multiple TEL lines if multiple numbers appear. Omit any field not found on the card.'
      });

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1024,
          messages: [{ role: 'user', content }]
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || 'API error ' + response.status);
      }

      const data = await response.json();
      const vcf = data.content[0].text.trim();
      currentVcf = vcf;

      // Extract display name
      const fnMatch = vcf.match(/^FN:(.+)$/m);
      const displayName = fnMatch ? fnMatch[1].trim() : 'Contact';

      document.getElementById('contactName').textContent = displayName;
      document.getElementById('vcfPreview').textContent = vcf;
      document.getElementById('resultCard').classList.add('visible');
      setStatus('✓ Card scanned successfully', 'success');

    } catch (err) {
      setStatus('✕ ' + err.message, 'error');
      btn.disabled = false;
    }
  }

  function downloadVcf() {
    if (!currentVcf) return;
    const fnMatch = currentVcf.match(/^FN:(.+)$/m);
    const name = fnMatch ? fnMatch[1].trim().replace(/[^a-z0-9]/gi, '_') : 'contact';
    const blob = new Blob([currentVcf], { type: 'text/vcard' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name + '.vcf';
    a.click();
    URL.revokeObjectURL(url);
  }

  function copyVcf() {
    if (!currentVcf) return;
    navigator.clipboard.writeText(currentVcf).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  }

  function reset() {
    currentVcf = '';
    frontPhoto = null;
    backPhoto = null;
    document.getElementById('frontInput').value = '';
    document.getElementById('backInput').value = '';
    document.getElementById('backToggle').checked = false;
    resetSlot('frontSlot', 'Front of card', 'front');
    resetSlot('backSlot', 'Back of card', 'back');
    document.getElementById('backSlot').classList.remove('visible');
    document.getElementById('resultCard').classList.remove('visible');
    document.getElementById('status').classList.remove('visible');
    updateScanBtn();
  }
</script>
</body>
</html>
